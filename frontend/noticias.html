  <script>
    async function loadNews() {
      const grid = document.getElementById("news-grid");
      try {
        const res = await fetch("/api/news");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "No se pudieron cargar noticias");
        const pages = data.pages || [];
        if (!pages.length) {
          grid.innerHTML = '<p class="text-zinc-500">Sin noticias publicadas.</p>';
          return;
        }
        grid.innerHTML = pages.map((page) => `
          <article class="glass rounded-2xl p-4 border border-white/10">
            <p class="text-xs text-zinc-500">${page.publishedAt || page.updatedAt || ""}</p>
            <h2 class="font-display text-2xl mt-1">${page.title}</h2>
            <p class="text-zinc-300 text-sm mt-2">${page.summary || ""}</p>
            <a href="/noticias/${encodeURIComponent(page.slug)}" class="inline-block mt-4 px-4 py-2 rounded-lg bg-red-700 hover:bg-red-600">Leer</a>
          </article>
        `).join("");
      } catch (error) {
        grid.innerHTML = `<p class="text-red-300">${error.message}</p>`;
      }
    }
    loadNews();
  </script>

  <script>
    function getDemoId() {
      const params = new URLSearchParams(window.location.search);
      const queryId = (params.get("id") || "").trim();
      if (queryId) return queryId;
      const parts = window.location.pathname.split("/").filter(Boolean);
      const demoIndex = parts.indexOf("demo");
      if (demoIndex >= 0 && parts[demoIndex + 1]) return decodeURIComponent(parts[demoIndex + 1]);
      return "";
    }

    const id = getDemoId();
    const demos = (window.BFEditable && Array.isArray(window.BFEditable.demos)) ? window.BFEditable.demos : [];
    const demo = demos.find((item) => String(item.id || "").toLowerCase() === id.toLowerCase());

    const idLabel = document.getElementById("demo-id-label");
    const title = document.getElementById("demo-title");
    const summary = document.getElementById("demo-summary");
    const image = document.getElementById("demo-image");
    const downloadWin = document.getElementById("download-win");
    const downloadAlt = document.getElementById("download-alt");
    const status = document.getElementById("download-status");

    if (!demo) {
      idLabel.textContent = id ? `ID no encontrada: ${id}` : "ID faltante";
      title.textContent = "Demo no disponible";
      summary.textContent = "Regresa a la pagina de demos y selecciona una demo valida.";
      image.style.display = "none";
      downloadWin.disabled = true;
      downloadAlt.disabled = true;
      downloadWin.classList.add("opacity-50", "cursor-not-allowed");
      downloadAlt.classList.add("opacity-50", "cursor-not-allowed");
    } else {
      idLabel.textContent = `ID: ${demo.id}`;
      title.textContent = demo.title || "Demo";
      summary.textContent = `${demo.summary || ""} Build ${demo.version || "N/A"}`;
      image.src = demo.image || "";
      image.onerror = () => {
        image.style.display = "none";
      };

      const fakeDownload = () => {
        status.textContent = `Descarga solicitada para ${demo.id}.`;
      };
      downloadWin.addEventListener("click", fakeDownload);
      downloadAlt.addEventListener("click", fakeDownload);
    }
  </script>

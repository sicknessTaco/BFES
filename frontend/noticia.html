<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackForge | Noticia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>window.tailwind = window.tailwind || {};</script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ["Orbitron", "sans-serif"], body: ["Rajdhani", "sans-serif"] },
          colors: { coal: "#070707", crimson: "#D80B17", ember: "#FF4D4D", wine: "#52060A" }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <style>.glass{background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.03));backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12)}</style>
</head>
<body class="bg-coal text-white font-body min-h-screen">
  <div class="fixed inset-0 -z-10 overflow-hidden"><div class="absolute -top-24 -left-20 w-[32rem] h-[32rem] bg-crimson/20 blur-3xl rounded-full"></div><div class="absolute top-1/2 right-0 w-[28rem] h-[28rem] bg-wine/60 blur-3xl rounded-full"></div></div>
  <header class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <nav class="glass rounded-2xl p-4 sm:p-5 flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
      <div class="flex items-center gap-3"><img src="/imagenes/logo.png" alt="BlackForge logo" class="w-10 h-10 rounded-lg object-cover border border-white/20 bg-black/30" onerror="this.style.display='none';this.nextElementSibling.style.marginLeft='0';" /><p class="font-display text-lg tracking-[2px]">BLACKFORGE ENTERTAINMENT SOFTWARE</p></div>
      <div class="flex flex-wrap gap-3 text-sm sm:text-base"><a href="/index.html" class="hover:text-ember">Inicio</a><a href="/noticias.html" class="text-ember">Noticias</a></div>
    </nav>
  </header>
  <main class="max-w-4xl mx-auto px-4 sm:px-6 pb-20">
    <article class="glass rounded-3xl p-6">
      <p id="news-date" class="text-zinc-500 text-sm"></p>
      <h1 id="news-title" class="font-display text-4xl mt-2">Cargando...</h1>
      <p id="news-summary" class="text-zinc-300 mt-3"></p>
      <img id="news-cover" class="mt-5 w-full rounded-2xl border border-white/10 hidden" alt="cover" />
      <div id="news-content" class="mt-5 text-zinc-200 whitespace-pre-wrap"></div>
    </article>
  </main>
  <script>
    function slugFromPath() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      const i = parts.indexOf("noticias");
      if (i >= 0 && parts[i + 1]) return decodeURIComponent(parts[i + 1]);
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || "";
    }

    async function loadNewsPage() {
      const slug = slugFromPath();
      const titleEl = document.getElementById("news-title");
      const summaryEl = document.getElementById("news-summary");
      const contentEl = document.getElementById("news-content");
      const dateEl = document.getElementById("news-date");
      const coverEl = document.getElementById("news-cover");

      if (!slug) {
        titleEl.textContent = "Noticia no encontrada";
        summaryEl.textContent = "Falta el slug de la noticia.";
        return;
      }

      try {
        const res = await fetch(`/api/news/${encodeURIComponent(slug)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "No se pudo cargar la noticia");
        const page = data.page;
        titleEl.textContent = page.title || "Noticia";
        summaryEl.textContent = page.summary || "";
        contentEl.textContent = page.content || "";
        dateEl.textContent = page.publishedAt || page.updatedAt || "";
        if (page.coverImage) {
          coverEl.src = page.coverImage;
          coverEl.classList.remove("hidden");
        }
      } catch (error) {
        titleEl.textContent = "Error cargando noticia";
        summaryEl.textContent = error.message;
      }
    }

    loadNewsPage();
  </script>
</body>
</html>
